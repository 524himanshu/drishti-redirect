<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrishtiAI - Live Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 40px;
            background: #1e293b;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        a {
            display: block;
            margin: 15px 0;
            padding: 16px;
            text-decoration: none;
            background: #2563eb;
            color: white;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        a:hover {
            background: #1d4ed8;
        }

        .badge {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 DrishtiAI</h1>
        <p>AI-powered Patient Safety Signal Intelligence Platform</p>

        <a href="https://drishti-ai-1.onrender.com" target="_blank">
            Open Live Dashboard
        </a>

        <a href="https://drishti-ai-szyx.onrender.com/docs" target="_blank">
            Open API Documentation
        </a>

        <div class="badge">
            Prototype Submission Build
        </div>
    </div>
</body>
</html>
